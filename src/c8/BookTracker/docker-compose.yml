# Qdrant for the Day 2 Lab 3 RAG path. Both ports are required:
#   6333 = REST/dashboard, 6334 = gRPC (what the .NET Qdrant.Client uses).
# Set "VectorStore:Provider" to "Qdrant" in appsettings to use this instead of the in-memory store.
# Embeddings come from a local Ollama (run separately): `ollama pull nomic-embed-text && ollama serve`.
services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
