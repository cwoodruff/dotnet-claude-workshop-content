# Qdrant for Day 2 Demo 5 (RAG grounded vs ungrounded). Both ports are required:
#   6333 = REST/dashboard, 6334 = gRPC (what the .NET Qdrant.Client uses).
# If Docker is down, set "VectorStore:Provider" to "InMemory" in src/Demo5.Rag/appsettings.json.
# Embeddings come from a local Ollama (run separately): `ollama pull nomic-embed-text && ollama serve`.
services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
